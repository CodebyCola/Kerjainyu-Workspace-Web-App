services:
  postgres:
    image: postgres:17
    container_name: kerjainyu-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: kerjainyu

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
